<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="또또하우스">
<title>DDODDOHOUSE — ARCADE</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/png" href="/icon-192.png">
<style>
  /* 폰트 자체 호스팅 — CDN 장애·오프라인에도 픽셀 룩 유지 */
  @font-face{
    font-family:'Press Start 2P';
    src:url('/fonts/press-start-2p.woff2') format('woff2');
    font-weight:normal;font-style:normal;font-display:swap;
  }
  @font-face{
    font-family:'DungGeunMo';
    src:url('/fonts/dunggeunmo.woff2') format('woff2');
    font-weight:normal;font-style:normal;font-display:swap;
  }
  :root{
    --bg:#0d0d12;
    --bg2:#15151d;
    --surface:#1b1b25;
    --surface-2:#23232f;
    --line:#33333f;
    --line-2:#444452;
    --text:#fff;
    --muted:#9a9aae;
    --muted-2:#62626f;
    --p:#ff007f;   /* 핑크 */
    --g:#39ff14;   /* 그린 */
    --b:#00ffff;   /* 블루 */
    --y:#ffea00;   /* 옐로우 */
    --pur:#b66dff; /* 퍼플 */
    --font-pixel:'Press Start 2P','DungGeunMo',cursive;
    --font-pixel-bold:'Press Start 2P','DungGeunMo',cursive;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--b);outline-offset:2px}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);
    font-family:'DungGeunMo','Noto Sans KR',sans-serif;
    overflow:hidden;position:fixed;width:100%;
  }
  /* scanline + glow backdrop */
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(circle at 15% 0%, rgba(255,0,127,.12), transparent 40%),
      radial-gradient(circle at 85% 100%, rgba(0,255,255,.10), transparent 42%);
  }
  body::after{
    content:'';position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.5;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px,rgba(0,0,0,0) 4px);
  }
  #app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;max-width:500px;margin:0 auto}
  .pixel{font-family:var(--font-pixel);letter-spacing:0}

  /* ---- Header ---- */
  header{padding:18px 18px 10px;flex-shrink:0;position:relative}
  .logo{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
  .logo .ico{font-size:1.2rem}
  .logo h1{font-family:var(--font-pixel);font-size:1.05rem;line-height:1.5;text-align:center}
  .logo .ddo{color:var(--p);text-shadow:0 0 8px rgba(255,0,127,.8),2px 2px 0 #6a0036}
  .logo .house{color:var(--b);text-shadow:0 0 8px rgba(0,255,255,.7),2px 2px 0 #006a6a}
  .subbar{display:flex;align-items:center;justify-content:center;gap:7px;margin-top:9px}
  .insert{font-family:var(--font-pixel);font-size:.5rem;color:var(--y);animation:blink 1.2s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .sync{display:flex;align-items:center;gap:5px;font-size:.58rem;color:var(--muted-2);font-weight:700}
  .sync .d{width:7px;height:7px;border-radius:50%;background:var(--muted-2);transition:all .3s}
  .sync.ok .d{background:var(--g);box-shadow:0 0 8px var(--g)}
  .sync.err .d{background:var(--p)}
  .sync.saving .d{background:var(--y);animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.3}}
  .gear{position:absolute;top:16px;right:16px;background:var(--surface);border:2px solid var(--line);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:.9rem;display:grid;place-items:center;color:var(--muted)}

  main{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 16px 100px;-webkit-overflow-scrolling:touch}
  main::-webkit-scrollbar{width:0}
  .view{display:none;animation:fade .3s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .sec-title{font-family:var(--font-pixel);color:var(--b);font-size:.72rem;margin:16px 2px 14px;display:flex;align-items:center;gap:8px;text-shadow:0 0 6px rgba(0,255,255,.4)}
  .sec-title .count{font-family:var(--font-pixel);font-size:.5rem;background:var(--surface);color:var(--g);padding:4px 8px;border-radius:6px;border:2px solid var(--line)}

  /* ---- Tabs(rank) ---- */
  .seg-top{display:flex;gap:8px;margin:16px 0}
  .seg-top button{flex:1;padding:11px;border:2px solid var(--line);border-radius:8px;background:var(--surface);color:var(--muted);font-family:var(--font-pixel);font-size:.56rem;cursor:pointer;transition:.2s;line-height:1.4}
  .seg-top button.on{border-color:var(--g);background:rgba(57,255,20,.1);color:var(--g);text-shadow:0 0 6px rgba(57,255,20,.5)}

  /* ---- Trophy Room (픽셀 트로피 진열장) ---- */
  .tr-row{display:flex;justify-content:center;align-items:flex-end;gap:16px;padding:0 8px;margin-top:30px}
  .tr-pod{display:flex;flex-direction:column;align-items:center;min-width:0}
  .tr-pod svg{display:block}
  .tr-plate{margin-top:9px;max-width:104px;padding:5px 8px;font-size:.8rem;font-weight:700;color:#111;border:2px solid #000;box-shadow:2px 2px 0 #000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tr-rate{font-family:var(--font-pixel);font-size:.6rem;margin-top:9px;line-height:1}
  .tr-gold .tr-rate{color:var(--y);text-shadow:0 0 7px rgba(255,234,0,.5)}
  .tr-silver .tr-rate{color:#d5d5e6;text-shadow:0 0 7px rgba(213,213,230,.4)}
  .tr-bronze .tr-rate{color:#d98b45;text-shadow:0 0 7px rgba(217,139,69,.4)}
  .tr-rec{font-size:.72rem;color:var(--muted);margin-top:6px;margin-bottom:12px;white-space:nowrap}
  .tr-gold svg{filter:drop-shadow(0 0 10px rgba(255,234,0,.35))}
  .tr-silver svg{filter:drop-shadow(0 0 7px rgba(200,200,230,.25))}
  .tr-bronze svg{filter:drop-shadow(0 0 7px rgba(205,127,50,.25))}
  .tr-shelf{position:relative;height:26px;margin:0 6px}
  .tr-shelf .bar{height:9px;background:linear-gradient(180deg,#3d3d4c,#20202b);border:2px solid #000}
  .tr-shelf i{position:absolute;top:9px;width:9px;height:16px;background:#23232f;border:2px solid #000;border-top:none}
  .tr-shelf i:nth-child(2){left:13%}
  .tr-shelf i:nth-child(3){left:calc(50% - 5px)}
  .tr-shelf i:nth-child(4){right:13%}
  .spk{opacity:0}
  .tr-gold .spk{animation:spark 2.4s steps(1) infinite}
  .tr-gold .spk2{animation-delay:1.2s}
  @keyframes spark{0%,44%{opacity:0}45%,60%{opacity:1}61%,100%{opacity:0}}

  /* ---- High Score Board (아케이드 하이스코어) ---- */
  .hs-board{background:var(--surface);border:2px solid var(--line);padding:4px 10px 10px;margin-top:20px}
  .hs-head{display:grid;grid-template-columns:1fr 1fr 1fr;column-gap:8px;padding:12px 16px 10px;font-family:var(--font-pixel);font-size:.5rem;color:var(--b);text-shadow:0 0 6px rgba(0,255,255,.4);border-bottom:2px solid var(--line);text-align:center}
  .hs-row{display:grid;grid-template-columns:1fr 1fr 1fr;column-gap:8px;align-items:center;padding:11px 16px}
  .hs-rows .hs-row:nth-child(even){background:#12121c}
  .hs-rank{font-family:var(--font-pixel);font-size:.56rem;text-align:center}
  .hs-name{font-size:.9rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;text-align:center}
  .hs-rec{font-size:.9rem;font-weight:700;white-space:nowrap;text-align:center}
  .hs-rate{font-size:.85em;opacity:.6;margin-left:3px}
  .hs-rows .hs-row.hs-top{background:#14141f;background:color-mix(in srgb,currentColor 13%,#0b0b10);border:3px solid currentColor;padding:8px 13px;animation:hsblink 1s step-end infinite}
  @keyframes hsblink{0%,50%{opacity:1}51%,100%{opacity:.25}}
  @media (max-width:360px){.hs-rate{font-size:.68em}}
  @media (prefers-reduced-motion:reduce){.hs-rows .hs-row.hs-top,.tr-gold .spk{animation:none}}

  .panel{background:var(--surface);border:2px solid var(--line);border-radius:10px;padding:6px 14px}

  /* ---- Session ---- */
  .session{margin-bottom:16px}
  .session .s-head{display:flex;align-items:center;gap:9px;margin:0 2px 10px}
  .session .s-date{font-weight:900;font-size:.92rem;color:var(--b)}
  .session .s-meta{font-family:var(--font-pixel);font-size:.5rem;color:var(--muted);background:var(--surface);padding:4px 8px;border-radius:6px;border:2px solid var(--line)}
  .session .s-line{flex:1;height:2px;background:var(--line)}
  .s-winner{background:rgba(255,234,0,.08);border:2px solid var(--y);border-radius:10px;padding:14px;display:flex;align-items:center;gap:13px}
  .s-crown{flex-shrink:0;display:grid;place-items:center}
  .s-crown svg{display:block;filter:drop-shadow(0 0 8px rgba(255,217,59,.45))}
  .s-winner .wt{flex:1}
  .s-winner .wt .wlbl{font-family:var(--font-pixel);font-size:.46rem;color:var(--y);letter-spacing:.5px;margin-bottom:3px}
  .s-winner .wt .wnm{font-size:1.05rem;font-weight:900}
  .s-winner .wt .wsub{font-size:.64rem;color:var(--muted);font-weight:600;margin-top:1px}
  .s-games{margin-top:10px;display:flex;flex-direction:column;gap:7px}
  .s-game{display:flex;align-items:center;gap:9px;font-size:.78rem;padding:9px 11px;background:var(--bg2);border-radius:8px;border:2px solid var(--line)}
  .s-game .sg-ico{font-size:1.05rem}
  .s-game .sg-nm{font-weight:700;color:var(--muted);flex:1}
  .s-game .sg-win{font-size:.7rem;color:var(--g);font-weight:700;display:flex;align-items:center;gap:3px}

  /* ---- Search + cats ---- */
  .search-wrap{position:relative;margin-bottom:11px}
  .search-wrap input{width:100%;background:var(--surface);border:2px solid var(--line);border-radius:8px;padding:13px 16px 13px 42px;color:#fff;font-family:'DungGeunMo','Noto Sans KR',sans-serif;font-size:.92rem;font-weight:600;outline:none;transition:.2s}
  .search-wrap input:focus{border-color:var(--b);box-shadow:0 0 0 3px rgba(0,255,255,.12)}
  .search-wrap input::placeholder{color:var(--muted-2);font-weight:500}
  .search-wrap .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.7}
  .search-wrap .clr{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:var(--surface-2);border:none;border-radius:6px;width:24px;height:24px;cursor:pointer;color:var(--muted);font-size:.8rem;display:none;place-items:center}
  .search-wrap .clr.show{display:grid}
  .cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
  .cats::-webkit-scrollbar{height:0}
  .cat{flex-shrink:0;padding:9px 14px;border:2px solid var(--line);border-radius:8px;background:var(--surface);color:var(--muted);font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap;user-select:none}
  .cat.on{border-color:var(--g);background:rgba(57,255,20,.1);color:var(--g)}

  /* ---- Game grid ---- */
  .game-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .game-card{background:var(--surface);border:2px solid var(--line);border-radius:10px;padding:14px;position:relative;transition:.15s}
  .game-card:active{transform:scale(.97)}
  .game-card:hover{border-color:var(--line-2)}
  .game-card .top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:11px;padding-top:18px}
  .game-card .ico{width:46px;height:46px;border-radius:8px;display:grid;place-items:center;font-size:1.5rem;background:var(--bg2);border:2px solid var(--line)}
  .game-card .pcount{text-align:right}
  .game-card .pcount b{display:block;font-family:var(--font-pixel);font-size:.82rem;color:var(--p);line-height:1.3;text-shadow:0 0 6px rgba(255,0,127,.4)}
  .game-card .pcount small{font-size:.52rem;color:var(--muted-2);font-weight:700}
  .game-card h3{font-size:.92rem;font-weight:900;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .game-card h3 mark{background:rgba(0,255,255,.25);color:var(--b);border-radius:2px;padding:0 2px}
  .game-card .catlbl{display:inline-block;font-size:.56rem;color:var(--pur);font-weight:800;margin-bottom:9px;border:1.5px solid var(--pur);padding:2px 6px;border-radius:5px}
  .game-card .gdel,.game-card .gedit{position:absolute;top:8px;width:22px;height:22px;border-radius:6px;border:2px solid var(--line);background:var(--bg2);color:var(--muted-2);font-size:.7rem;cursor:pointer;display:grid;place-items:center;line-height:1;z-index:2;transition:.15s}
  .game-card .gdel{right:8px}
  .game-card .gedit{right:36px}
  .game-card .gdel:active{transform:scale(.85);border-color:var(--p);color:var(--p)}
  .game-card .gedit:active{transform:scale(.85);border-color:var(--b);color:var(--b)}
  .game-card .badges{display:flex;gap:5px;flex-wrap:wrap}
  .badge{font-size:.6rem;background:var(--bg2);color:var(--muted);padding:3px 7px;border-radius:5px;font-weight:700;border:1.5px solid var(--line)}
  .badge.own{color:var(--g);border-color:rgba(57,255,20,.3)}

  /* ---- History ---- */
  .log{display:flex;gap:12px;align-items:flex-start;padding:13px 0;border-bottom:2px solid var(--bg2)}
  .log:last-child{border-bottom:none}
  .log .dot{width:9px;height:9px;background:var(--g);margin-top:6px;flex-shrink:0;box-shadow:0 0 8px var(--g)}
  .log .body{flex:1}
  .log .body .gname{font-weight:700;font-size:.92rem}
  .log .body .date{font-size:.6rem;color:var(--muted-2);margin-bottom:7px;font-weight:700}
  .log .players{display:flex;gap:5px;flex-wrap:wrap}
  .pchip{font-size:.66rem;padding:4px 10px;border-radius:6px;background:var(--bg2);color:var(--muted);font-weight:700;display:flex;align-items:center;gap:3px;border:2px solid var(--line)}
  .pchip.win{background:var(--g);color:#000;border-color:transparent}
  .pchip .sc{opacity:.7;font-size:.6rem}

  /* ---- Stats ---- */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
  .stat-box{background:var(--surface);border:2px solid var(--line);border-radius:10px;padding:16px;text-align:center}
  .stat-box b{font-family:var(--font-pixel);font-size:1rem;display:block;line-height:1.3}
  .stat-box:nth-child(1) b{color:var(--p)}
  .stat-box:nth-child(2) b{color:var(--pur)}
  .stat-box:nth-child(3) b{color:var(--g)}
  .stat-box:nth-child(4) b{color:var(--y)}
  .stat-box small{font-size:.6rem;color:var(--muted);font-weight:700;display:block;margin-top:8px}
  .bar-stat{margin-bottom:14px}
  .bar-stat .lbl{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:6px}
  .bar-stat .lbl b{font-weight:700}
  .bar-stat .lbl span{color:var(--muted-2);font-weight:700;font-family:var(--font-pixel);font-size:.55rem}
  .bar-stat .track{height:12px;background:var(--bg2);border-radius:3px;overflow:hidden;border:2px solid var(--line)}
  .bar-stat .fill{height:100%;background:var(--b);box-shadow:0 0 8px var(--b);transition:width .8s cubic-bezier(.2,.8,.2,1)}
  .bar-stat:nth-child(even) .fill{background:var(--p);box-shadow:0 0 8px var(--p)}

  .empty{text-align:center;padding:46px 20px;color:var(--muted-2);grid-column:1/-1}
  .empty .e-ico{font-size:2.4rem;margin-bottom:14px}
  .empty p{font-size:.84rem;line-height:1.7;font-weight:600}
  .empty .pix{font-family:var(--font-pixel);font-size:.6rem;color:var(--muted);margin-top:10px;line-height:1.8}

  /* ---- Tab nav (5칸, 가운데 NEW LOG) ---- */
  nav{position:absolute;bottom:0;left:0;right:0;z-index:20;display:flex;background:#000;border-top:2px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;border:none;color:var(--muted-2);font-family:var(--font-pixel);cursor:pointer;transition:.3s;padding:14px 2px;display:flex;flex-direction:column;align-items:center;gap:6px;font-size:.5rem;line-height:1.3}
  nav button .ni{font-size:1.15rem}
  nav button.on{color:var(--y);text-shadow:0 0 8px rgba(255,234,0,.6)}
  nav button[data-v="rank"].on{color:var(--g);text-shadow:0 0 8px rgba(57,255,20,.6)}
  nav button[data-v="games"].on{color:var(--b);text-shadow:0 0 8px rgba(0,255,255,.6)}
  nav button[data-v="log"].on{color:var(--b);text-shadow:0 0 8px rgba(0,255,255,.6)}
  nav button[data-v="stats"].on{color:var(--p);text-shadow:0 0 8px rgba(255,0,127,.6)}
  /* 가운데 NEW LOG 버튼 */
  nav button.navnew{color:var(--p);font-size:.44rem;justify-content:flex-end}
  nav button.navnew .ni{width:48px;height:48px;border-radius:14px;background:var(--p);display:grid;place-items:center;font-size:1.7rem;color:#fff;box-shadow:0 0 18px rgba(255,0,127,.55);border:2px solid #000;margin-top:-22px;transition:transform .15s;line-height:1}
  nav button.navnew:active .ni{transform:scale(.9)}

  .scrim{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .3s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:absolute;bottom:0;left:0;right:0;max-width:500px;margin:0 auto;background:var(--bg2);border-radius:16px 16px 0 0;border-top:2px solid var(--line-2);padding:8px 18px calc(24px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .35s cubic-bezier(.2,.9,.3,1);max-height:90vh;overflow-y:auto}
  .scrim.show .sheet{transform:translateY(0)}
  .grab{width:42px;height:5px;border-radius:5px;background:var(--line-2);margin:8px auto 18px}
  .sheet h2{font-family:var(--font-pixel);font-size:.85rem;margin-bottom:20px;line-height:1.5;color:var(--y)}
  .step-lbl{font-family:var(--font-pixel);font-size:.56rem;color:var(--b);margin-bottom:10px;text-shadow:0 0 6px rgba(0,255,255,.4)}
  label.fld{display:block;margin-bottom:16px}
  label.fld .t{font-size:.72rem;color:var(--muted);font-weight:700;margin-bottom:7px;display:block}
  input,select{width:100%;background:var(--surface);border:2px solid var(--line);border-radius:8px;padding:13px 14px;color:#fff;font-family:'DungGeunMo','Noto Sans KR',sans-serif;font-size:.92rem;font-weight:600;outline:none;transition:border-color .2s}
  input:focus,select:focus{border-color:var(--b)}
  input::placeholder{color:var(--muted-2);font-weight:500}
  select option{background:var(--surface)}
  .row2{display:flex;gap:10px}
  .row2 label.fld{flex:1}
  .ico-picker{display:flex;gap:8px;flex-wrap:wrap}
  .ico-picker button{width:44px;height:44px;border-radius:8px;border:2px solid var(--line);background:var(--surface);font-size:1.3rem;cursor:pointer;transition:.15s}
  .ico-picker button.sel{border-color:var(--g);background:rgba(57,255,20,.1)}
  .ico-custom{display:flex;align-items:center;gap:8px;margin-top:10px}
  /* 검색형 게임 선택 */
  .gsel{position:relative;margin-bottom:16px}
  .gsel-cur{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surface);border:2px solid var(--line);border-radius:8px;padding:13px 14px;color:#fff;font-size:.92rem;font-weight:600;cursor:pointer}
  .gsel-cur .gsel-arrow{color:var(--muted-2);font-size:.8rem;flex-shrink:0}
  .gsel-pop{display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:30;background:var(--surface-2);border:2px solid var(--b);border-radius:10px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.5)}
  .gsel-pop.show{display:block}
  .gsel-search{width:100%;background:var(--bg2);border:none;border-bottom:2px solid var(--line);border-radius:0;padding:13px 14px;color:#fff;font-size:.9rem;font-weight:600;outline:none}
  .gsel-list{max-height:240px;overflow-y:auto}

<body>

  <main>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"><div class="grab"></div><div id="sheetBody"></div></div></div>

<div class="toast" id="toast"></div>

<script>
const ICONS=['🎲','🃏','♟️','🧩','🏰','🐉','🚀','🗺️','💎','🦑','🍄','⚔️','🏛️','🎯','🐙','👑', '🌱', '☠️', '🐟', '🤿'];
const AVA_COLORS=['#ff007f','#39ff14','#00ffff','#ffea00','#b66dff','#ff8c42','#42d9ff','#ff5cae','#7cff5c','#ffb300','#5c7cff','#ff5c5c','#00e0a4','#d68cff','#a8ff3e','#ff7eb6'];
const FRIENDS=['연경','영식'];
const CATEGORIES=['카드','주사위','전략','파티','협력','추리','기타'];
const CIRCLED=['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮'];

let DB={games:[],players:[],logs:[],rev:0};
let searchQuery='';let activeCat='전체';

// 비밀 코드: URL(?key=... 또는 #key=...)로 받으면 저장 후 주소에서 지움
const KEY_LS='ddoddohouse_key';
function initKey(){
  const m=(location.search+location.hash).match(/[?#&]key=([^&#]+)/);
  if(m){localStorage.setItem(KEY_LS,decodeURIComponent(m[1]));history.replaceState(null,'',location.pathname);}
}
function appKey(){return localStorage.getItem(KEY_LS)||''}

function setSync(state,txt){const el=$('#sync');if(!el)return;el.className='sync '+state;const t=$('#syncTxt');if(t)t.textContent=txt}

// Vercel 서버리스 API (/api/data) 호출 헬퍼
async function apiGet(){
  const r=await fetch('/api/data');
  if(!r.ok)throw new Error('load fail: '+r.status);
  const d=await r.json();
  if(d&&d.rev==null)d.rev=0;
  return d;
}
// 저장: rev(버전 번호)를 함께 보내고, 서버가 더 최신이면 409로 거절당함
async function apiSave(db){
  const r=await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json','x-app-key':appKey()},body:JSON.stringify(db)});
  if(r.status===409){const j=await r.json();return{conflict:true,server:j.data}}
  if(r.status===401)throw new Error('unauthorized');
  if(!r.ok)throw new Error('save fail: '+r.status);
  const j=await r.json();
  return{conflict:false,rev:j.rev};
}

// 두 DB 병합: id 기준 합집합, 같은 id는 내 쪽(local)이 우선
function mergeDB(server,local){
  const merge=(a,b)=>{const m={};(a||[]).forEach(x=>m[x.id]=x);(b||[]).forEach(x=>m[x.id]=x);return Object.values(m)};
  return{
    rev:Math.max(server.rev||0,local.rev||0),
    games:merge(server.games,local.games),
    players:merge(server.players,local.players),
    logs:merge(server.logs,local.logs)
  };
}

const DIRTY_LS='ddoddohouse_dirty'; // 서버 저장에 실패한 기록이 로컬에 남아있다는 표시
function readLocal(){try{const r=localStorage.getItem('ddoddohouse_db');return r?JSON.parse(r):null}catch(e){return null}}

async function load(){
  setSync('saving','SYNC…');
  try{
    const data=(await apiGet())||{games:[],players:[],logs:[],rev:0};
    if(!data.games)Object.assign(data,{games:[],players:[],logs:[]});
    const local=readLocal();
    if(local&&local.games&&localStorage.getItem(DIRTY_LS)){
      // 오프라인 중 저장했던 기록이 있음 → 서버 데이터와 병합하고 서버로 밀어올림
      DB=mergeDB(data,local);
      setSync('ok','ONLINE');
      await save();
    }else{
      DB=data;
      setSync('ok','ONLINE');
    }
  }catch(e){
    const local=readLocal();
    if(local)DB=local;
    if(!DB.games)DB={games:[],players:[],logs:[],rev:0};
    setSync('err','OFFLINE');
  }
}

async function save(){
  try{localStorage.setItem('ddoddohouse_db',JSON.stringify(DB));}catch(e){}
  setSync('saving','SAVE…');
  try{
    let res=await apiSave(DB);
    if(res.conflict){
      // 내 데이터가 낡음(다른 사람이 먼저 저장) → 서버 데이터와 병합 후 한 번 더 저장
      DB=mergeDB(res.server,DB);
      res=await apiSave(DB);
      if(res.conflict)throw new Error('conflict');
      render();
    }
    DB.rev=res.rev;
    try{localStorage.setItem('ddoddohouse_db',JSON.stringify(DB));localStorage.removeItem(DIRTY_LS);}catch(e){}
    setSync('ok','ONLINE');
  }catch(e){
    try{localStorage.setItem(DIRTY_LS,'1');}catch(_){}
    if(e.message==='unauthorized'){setSync('err','NO KEY');toast('비밀 코드가 필요해요 — ⚙️에서 입력');}
    else setSync('err','SAVE FAIL');
  }
}

const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getCho(str){let out='';for(const ch of str){const c=ch.charCodeAt(0)-0xAC00;if(c>=0&&c<=11171)out+=CHO[Math.floor(c/588)];else out+=ch;}return out;}
function matchGame(g,q){if(!q)return true;q=q.toLowerCase().trim();const name=g.name.toLowerCase();return name.includes(q)||getCho(g.name).includes(q)||(g.owner||'').toLowerCase().includes(q);}
function highlight(name,q){if(!q)return esc(name);const i=name.toLowerCase().indexOf(q.toLowerCase());if(i<0)return esc(name);return esc(name.slice(0,i))+'<mark>'+esc(name.slice(i,i+q.length))+'</mark>'+esc(name.slice(i+q.length));}
window.onSearch=v=>{searchQuery=v;$('#clrBtn').classList.toggle('show',!!v);renderGames()};
window.clearSearch=()=>{searchQuery='';$('#gameSearch').value='';$('#clrBtn').classList.remove('show');renderGames();$('#gameSearch').focus()};

const $=s=>document.querySelector(s);
const uid=()=>Math.random().toString(36).slice(2,9);
// 사용자 입력(이름·게임명·아이콘 등)을 HTML에 넣기 전 이스케이프
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function pickColor(){
  const used=new Set(DB.players.map(p=>p.color).filter(Boolean));
  for(const c of AVA_COLORS){if(!used.has(c))return c;}
  const hue=(DB.players.length*137.508)%360;
  return `hsl(${hue.toFixed(0)},85%,60%)`;
}
function avaColor(p){
  if(p&&typeof p==='object'&&p.color)return p.color;
  const name=typeof p==='string'?p:(p&&p.name)||'';
  const pl=DB.players.find(x=>x.name===name);
  if(pl){if(!pl.color)pl.color=pickColor();return pl.color;}
  let h=0;for(const c of name)h=c.charCodeAt(0)+((h<<5)-h);return AVA_COLORS[Math.abs(h)%AVA_COLORS.length];
}
function ensurePlayer(name){name=name.trim();if(!name)return null;let p=DB.players.find(x=>x.name===name);if(!p){p={id:uid(),name,color:pickColor()};DB.players.push(p)}else if(!p.color){p.color=pickColor()}return p}
function pname(id){const p=DB.players.find(x=>x.id===id);return p?p.name:'?'}
function gameOf(id){return DB.games.find(x=>x.id===id)}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()}
function dayLabel(ts){const d=new Date(ts);const wd=['일','월','화','수','목','금','토'][d.getDay()];return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+wd+')'}
function timeAgo(ts){const d=(Date.now()-ts)/86400000;if(d<1)return '오늘';if(d<2)return '어제';if(d<7)return Math.floor(d)+'일 전';const dt=new Date(ts);return (dt.getMonth()+1)+'월 '+dt.getDate()+'일'}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900)}

// 같은 날 같은 게임이 여러 판이면 회차 번호(①②③) 부여. 1판뿐이면 빈 문자열.
function roundMark(logsOfDay,log){
  const same=logsOfDay.filter(l=>l.gameId===log.gameId).sort((a,b)=>a.date-b.date);
  if(same.length<2)return '';
  const idx=same.findIndex(l=>l.id===log.id);
  return idx>=0&&idx<CIRCLED.length?CIRCLED[idx]:('('+(idx+1)+')');
}

function playerStats(logs){
  logs=logs||DB.logs;const m={};
  DB.players.forEach(p=>m[p.id]={name:p.name,color:p.color||avaColor(p),plays:0,wins:0});
  logs.forEach(l=>{l.players.forEach(pid=>{if(m[pid])m[pid].plays++});l.winners.forEach(pid=>{if(m[pid])m[pid].wins++})});
  return Object.values(m).filter(p=>p.plays>0).map(p=>({...p,rate:p.plays?Math.round(p.wins/p.plays*100):0})).sort((a,b)=>b.rate-a.rate||b.wins-a.wins);
}

// [공통 전적 계산] 트로피 진열장·하이스코어 보드가 함께 쓰는 유일한 계산 함수.
// winners가 빈 판(무승부·협력 실패)은 제외 —
// 유효 판수 = winners가 있는 참여 판, 승수 = 그중 winners 포함 판, 패수 = 유효-승, 승률 = 승/유효
function hallStats(){
  const m={};
  DB.players.forEach(p=>m[p.id]={id:p.id,name:p.name,color:p.color||avaColor(p),plays:0,wins:0});
  DB.logs.forEach(l=>{
    if(!l.winners||!l.winners.length)return;
    l.players.forEach(pid=>{if(m[pid])m[pid].plays++});
    l.winners.forEach(pid=>{if(m[pid])m[pid].wins++});
  });
  return Object.values(m).filter(p=>p.plays>0)
    .map(p=>({...p,losses:p.plays-p.wins,rate:Math.round(p.wins/p.plays*100)}))
    .sort((a,b)=>b.rate-a.rate||b.wins-a.wins||b.plays-a.plays);
}

// 픽셀 트로피: 13x13 도트맵을 SVG rect로 변환 (D=외곽, M=본체, L=하이라이트)
const TROPHY_MAP=[
'..DDDDDDDDD..',
'DDDMMMLMMMDDD',
'D.DMMMLMMMD.D',
'D.DMMMLMMMD.D',
'DD.DMMLMMD.DD',
'...DMMLMMD...',
'....DMLMD....',
'.....DMD.....',
'.....DMD.....',
'....DDMDD....',
'...DMMMMMD...',
'..DMMMMMMMD..',
'..DDDDDDDDD..'];
const TROPHY_PAL={
  gold:{d:'#7a5c00',m:'#ffea00',l:'#fff9a8'},
  silver:{d:'#55556a',m:'#c9c9dc',l:'#f4f4ff'},
  bronze:{d:'#6e3d14',m:'#cd7f32',l:'#f0b078'}
};
// 픽셀 왕관 (TODAY'S MVP 카드): 항상 금색, 밴드에 보석 2개(P=핑크, B=하늘)
const CROWN_MAP=[
'.D....D....D.',
'DMD..DMD..DMD',
'DMMD.DMD.DMMD',
'DMMMDMMMDMMMD',
'DLMMMMLMMMMLD',
'DMMPMMMMMBMMD',
'DDDDDDDDDDDDD'];
const CROWN_PAL={d:'#8a6a00',m:'#ffd93b',l:'#fff3a6',P:'#ff2d78',B:'#00e5ff'};
function crownSVG(px){
  let r='';
  CROWN_MAP.forEach((row,y)=>{[...row].forEach((ch,x)=>{
    const c=ch==='D'?CROWN_PAL.d:ch==='M'?CROWN_PAL.m:ch==='L'?CROWN_PAL.l:ch==='P'?CROWN_PAL.P:ch==='B'?CROWN_PAL.B:null;
    if(c)r+=`<rect x="${x}" y="${y}" width="1" height="1" fill="${c}"/>`;
  });});
  const h=Math.round(px/13*7);
  return `<svg viewBox="0 0 13 7" width="${px}" height="${h}" shape-rendering="crispEdges" aria-hidden="true">${r}</svg>`;
}

function trophySVG(kind,px){
  const pal=TROPHY_PAL[kind];let r='';
  TROPHY_MAP.forEach((row,y)=>{[...row].forEach((ch,x)=>{
    const c=ch==='D'?pal.d:ch==='M'?pal.m:ch==='L'?pal.l:null;
    if(c)r+=`<rect x="${x}" y="${y}" width="1" height="1" fill="${c}"/>`;
  });});
  if(kind==='gold')r+='<rect class="spk" x="4" y="2" width="1" height="1" fill="#fff"/><rect class="spk spk2" x="8" y="4" width="1" height="1" fill="#fff"/>';
  return `<svg viewBox="0 0 13 13" width="${px}" height="${px}" shape-rendering="crispEdges" aria-hidden="true">${r}</svg>`;
}

// 한 판(log)에서 특정 플레이어의 결과를 반환.
// 점수 기록이 있으면 정확한 등수(동점 공동순위), 없으면 승/패.
function resultInLog(log,pid){
  if(log.scores&&Object.keys(log.scores).length){
    const entries=log.players.map(id=>({id,sc:log.scores[id]!=null?+log.scores[id]:null}));
    const scored=entries.filter(e=>e.sc!=null).sort((a,b)=>b.sc-a.sc);
    const rm={};scored.forEach((e,i)=>{rm[e.id]=i>0&&scored[i-1].sc===e.sc?rm[scored[i-1].id]:i+1});
    const myScore=log.scores[pid];
    if(myScore==null)return {type:'none'};
    return {type:'rank',rank:rm[pid],total:scored.length,score:+myScore};
  }
  return {type:'wl',win:log.winners.includes(pid)};
}

window.openPlayerCard=(key,pid)=>{
  const allDayLogs=DB.logs.filter(l=>dayKey(l.date)===key);
  const logs=allDayLogs.filter(l=>l.players.includes(pid)).sort((a,b)=>a.date-b.date);
  if(!logs.length)return;
  const player=DB.players.find(p=>p.id===pid)||{name:pname(pid),color:'#999'};
  const dateLabel=dayLabel(logs[0].date);
  let wins=0;
  // 게임 행 생성 + 정렬용 점수 계산
  const items=logs.map(l=>{
    const g=gameOf(l.gameId);const rm=roundMark(allDayLogs,l);const res=resultInLog(l,pid);
    let badge='',cls='',sortKey=99;
    if(res.type==='rank'){
      if(res.rank===1){cls='pc-win';badge=`<span class="pc-rk pc-1">1등</span>`;sortKey=res.rank;}
      else{badge=`<span class="pc-rk">${res.rank}등</span>`;sortKey=res.rank;}
      badge+=`<span class="pc-sc">${res.score}점</span>`;
    }else if(res.type==='wl'){
      if(res.win){cls='pc-win';badge=`<span class="pc-rk pc-win-b">WIN</span>`;sortKey=1;}
      else{badge=`<span class="pc-rk pc-lose-b">💀 LOSE</span>`;sortKey=50;}
    }else{
      badge=`<span class="pc-rk">-</span>`;sortKey=99;
    }
    if(l.winners.includes(pid))wins++;
    const html=`<div class="pc-game ${cls}"><span class="pc-gico">${g?esc(g.icon):'🎲'}</span><span class="pc-gnm">${g?esc(g.name):'게임'}${rm?'<span class="pc-ground">'+rm+'</span>':''}</span><span class="pc-res">${badge}</span></div>`;
    return {html,sortKey};
  });
  // 등수/결과 좋은 순 정렬
  items.sort((a,b)=>a.sortKey-b.sortKey);
  const rowsHTML=items.map(i=>i.html).join('');
  const sub=`${wins} WIN / ${logs.length} PLAYS`;
  $('#pcBody').innerHTML=`
    <div class="pc-top">
      <div class="pc-date">${dateLabel}</div>
    </div>
    <div class="pc-hero">
      <div class="pc-logo">🎲 DDODDOHOUSE 🐰</div>
      <div class="pc-name" style="color:${player.color};text-shadow:0 0 20px ${player.color}88">${esc(player.name)}</div>
      <div class="pc-sub">${sub}</div>
    </div>
    <div class="pc-games">${rowsHTML}</div>
    <div class="pc-foot">★ OUR BOARD GAME NIGHT ★</div>`;
  $('#pcScrim').classList.add('show');
};

window.delGame=async(id,ev)=>{
  if(ev)ev.stopPropagation();
  const g=gameOf(id);if(!g)return;
  const used=DB.logs.filter(l=>l.gameId===id).length;
  if(used>0){toast(`기록 ${used}판이 남아있어요. LOG에서 먼저 지워주세요`);return}
  if(!confirm(`'${g.name}' 게임을 삭제할까요?`))return;
  DB.games=DB.games.filter(x=>x.id!==id);
  await save();render();toast('게임을 삭제했어요 🗑️');
}

document.querySelectorAll('nav button[data-v]').forEach(b=>b.onclick=()=>{document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));$('#v-'+b.dataset.v).classList.add('active');});

const scrim=$('#scrim');
function openSheet(html){$('#sheetBody').innerHTML=html;scrim.classList.add('show')}
function closeSheet(){scrim.classList.remove('show')}
scrim.onclick=e=>{if(e.target===scrim)closeSheet()};
$('#sdScrim').onclick=e=>{if(e.target.id==='sdScrim')closeSessionDetail()};
$('#pcScrim').onclick=e=>{if(e.target.id==='pcScrim')closePlayerCard()};
$('#navNew').onclick=()=>openSheet(sheetChooser());
$('#gear').onclick=()=>openSheet(settingsHTML());

function settingsHTML(){
  const k=appKey();
  return `<h2>DDODDOHOUSE</h2>
  <div class="hint" style="margin:-12px 0 16px">이 앱은 <b>서버(Upstash Redis)</b>에 기록을 저장해요. 별도 연결 없이 자동 동기화됩니다. 친구들과 같은 주소를 쓰면 기록이 함께 쌓여요. ✨</div>
  <label class="fld"><span class="t">비밀 코드 — 기록 저장에 필요해요 (주소 뒤에 ?key=코드 를 붙여 공유하면 자동 입력)</span><input id="setKey" type="text" value="${esc(k)}" placeholder="설정 안 했으면 비워두세요"></label>
  <button class="btn-ghost" onclick="saveKey()">코드 저장</button>
  <button class="action-btn" onclick="reloadFromSheet()">RELOAD</button>
  <button class="btn-ghost" onclick="resetAll()">기록 전체 초기화</button>`;
}
window.saveKey=()=>{
  const v=$('#setKey').value.trim();
  if(v)localStorage.setItem(KEY_LS,v);else localStorage.removeItem(KEY_LS);
  closeSheet();toast(v?'코드를 저장했어요 🔑':'코드를 지웠어요');
};
window.reloadFromSheet=async()=>{closeSheet();await load();normalizeDB();render();toast('서버에서 불러왔어요 🔄');};
window.resetAll=async()=>{
  if(!confirm('정말 모든 게임·기록을 지울까요? (연경·영식은 남아요)'))return;
  DB={games:[],players:[],logs:[],rev:DB.rev||0};FRIENDS.forEach(n=>ensurePlayer(n));
  await save();closeSheet();render();toast('초기화했어요');
};

function sheetChooser(){editingGameId=null;editingLogId=null;return `<h2>NEW LOG</h2><div class="seg"><button class="on" onclick="showLogForm(this)">🏁 결과</button><button onclick="showGameForm(this)">🎲 게임</button></div><div id="formArea">${logFormHTML()}</div>`;}
window.showLogForm=el=>{editingLogId=null;el.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on'));el.classList.add('on');$('#formArea').innerHTML=logFormHTML()};
window.showGameForm=el=>{editingGameId=null;el.parentNode.querySelectorAll('button').forEach(b=>b.classList.remove('on'));el.classList.add('on');$('#formArea').innerHTML=gameFormHTML()};

let editingGameId=null;
function gameFormHTML(){
  const g=editingGameId?gameOf(editingGameId):null;
  const v=(x,d)=>g?g[x]:d;
  return `<div class="row2"><label class="fld" style="flex:3"><span class="t">게임 이름</span><input id="gName" placeholder="예: 카탄, 스플렌더" value="${g?esc(g.name):''}"></label><label class="fld" style="flex:1"><span class="t">아이콘</span><input id="gIcoInput" type="text" value="${g&&g.icon?esc(g.icon):'🎲'}" style="text-align:center;font-size:1.5rem;padding:10px 4px"></label></div>
  <label class="fld"><span class="t">카테고리</span><select id="gCat">${CATEGORIES.map(c=>`<option value="${c}" ${g&&g.cat===c?'selected':''}>${c}</option>`).join('')}</select></label>
  <div class="row2"><label class="fld"><span class="t">최소 인원</span><input id="gMin" type="number" inputmode="numeric" value="${v('minP',2)}"></label><label class="fld"><span class="t">최대 인원</span><input id="gMax" type="number" inputmode="numeric" value="${v('maxP',4)}"></label><label class="fld"><span class="t">시간(분)</span><input id="gTime" type="number" inputmode="numeric" value="${v('time',60)}"></label></div>
  <label class="fld"><span class="t">소장자 (선택)</span><input id="gOwner" placeholder="누구 거예요?" value="${g&&g.owner?esc(g.owner):''}"></label>
  <button class="action-btn" onclick="addGame()">${g?'SAVE EDIT':'ADD GAME'}</button>`;
}
window.addGame=async()=>{
  const name=$('#gName').value.trim();if(!name){toast('게임 이름을 입력해주세요');return}
  // 입력된 이모지 중 첫 글자(grapheme) 사용, 비었으면 기본 주사위
  const icoRaw=[...$('#gIcoInput').value.trim()];
  const icon=icoRaw.length?icoRaw[0]:'🎲';
  const data={name,icon,cat:$('#gCat').value,minP:+$('#gMin').value||1,maxP:+$('#gMax').value||4,time:+$('#gTime').value||30,owner:$('#gOwner').value.trim()};
  if(editingGameId){
    const g=gameOf(editingGameId);if(g)Object.assign(g,data);
    await save();closeSheet();render();document.querySelector('nav button[data-v="games"]').click();toast('게임을 수정했어요 ✏️');
  }else{
    DB.games.push({id:uid(),...data});
    await save();closeSheet();render();document.querySelector('nav button[data-v="games"]').click();toast('게임 서랍에 넣었어요! 🎲');
  }
};
window.editGame=(id,ev)=>{if(ev)ev.stopPropagation();editingGameId=id;openSheet(`<h2>EDIT GAME</h2><div id="formArea">${gameFormHTML()}</div>`);};

let selPlayers=[];let selWinners=[];let scoreMode=false;let scores={};let editingLogId=null;
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dateStrOf(ts){const d=new Date(ts);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function logFormHTML(){
  const ed=editingLogId?DB.logs.find(l=>l.id===editingLogId):null;
  if(ed){
    selPlayers=[...ed.players];
    selWinners=ed.scores?[]:[...ed.winners];
    scoreMode=!!(ed.scores&&Object.keys(ed.scores).length);
    scores=ed.scores?{...ed.scores}:{};
  }else{
    selPlayers=[];selWinners=[];scoreMode=false;scores={};
  }
  if(!DB.games.length)return `<div class="empty"><div class="e-ico">🎲</div><p>먼저 게임을 등록해야<br>결과를 기록할 수 있어요.</p></div><button class="btn-ghost" onclick="showGameForm(document.querySelector('.seg button:last-child'))">게임 먼저 등록하기</button>`;
  const dateVal=ed?dateStrOf(ed.date):todayStr();
  const initGameId=ed?ed.gameId:(gamesByRecent()[0]&&gamesByRecent()[0].id)||'';
  return `
  <div class="step-lbl">STEP 1 · GAME & DATE</div>
  <input type="hidden" id="lGame" value="${initGameId}">
  <div class="gsel" id="gsel">
    <div class="gsel-cur" id="gselCur" onclick="toggleGsel()">${gselLabel(initGameId)}<span class="gsel-arrow">▾</span></div>
    <div class="gsel-pop" id="gselPop">
      <input class="gsel-search" id="gselSearch" type="text" placeholder="게임 검색 (이름·초성)" oninput="filterGsel(this.value)">
      <div class="gsel-list" id="gselList"></div>
    </div>
  </div>
  <label class="fld"><input id="lDate" type="date" value="${dateVal}"></label>
  <div class="step-lbl">STEP 2 · PLAYERS</div>
  <div class="chip-pick" id="lPlayers">${DB.players.map(p=>`<button data-id="${p.id}" class="${selPlayers.includes(p.id)?'sel':''}" onclick="togglePlayer(this)">${esc(p.name)}</button>`).join('')}</div>
  <div style="display:flex;gap:8px;margin:10px 0 16px"><input id="newP" placeholder="새 친구 추가" style="flex:1;min-width:0" onkeydown="if(event.key==='Enter')addPlayerChip()"><button class="btn-ghost" style="width:auto;margin:0;padding:13px 26px;white-space:nowrap;flex-shrink:0" onclick="addPlayerChip()">+ 추가</button></div>
  <div class="step-lbl">STEP 3 · RESULT</div>
  <div class="modetoggle"><button class="${scoreMode?'':'on'}" id="mWin" onclick="setMode(false)">👑 승자만</button><button class="${scoreMode?'on':''}" id="mScore" onclick="setMode(true)">🔢 점수→등수</button></div>
  <div id="resultArea"><div class="hint" style="margin:0">위에서 친구를 먼저 선택해주세요</div></div>
  <button class="action-btn" onclick="addLog()">${ed?'SAVE EDIT':'SAVE RESULT'}</button>`;
}
window.editLog=(id,ev)=>{if(ev)ev.stopPropagation();editingLogId=id;openSheet(`<h2>EDIT RECORD</h2><div id="formArea">${logFormHTML()}</div>`);setTimeout(refreshResult,0);};

// 게임을 최근 플레이 순으로 정렬 (최근 기록된 게임이 위로)
function gamesByRecent(){
  const lastPlayed={};
  DB.logs.forEach(l=>{if(!lastPlayed[l.gameId]||l.date>lastPlayed[l.gameId])lastPlayed[l.gameId]=l.date;});
  return [...DB.games].sort((a,b)=>(lastPlayed[b.id]||0)-(lastPlayed[a.id]||0));
}
function gselLabel(id){const g=gameOf(id);return g?`<span>${esc(g.icon)} ${esc(g.name)}</span>`:`<span style="color:var(--muted-2)">게임을 선택하세요</span>`;}
window.toggleGsel=()=>{const pop=$('#gselPop');const open=pop.classList.toggle('show');if(open){renderGselList('');setTimeout(()=>{const s=$('#gselSearch');if(s){s.value='';s.focus();}},50);}};
function renderGselList(q){
  const list=$('#gselList');if(!list)return;
  let games=gamesByRecent();
  if(q)games=games.filter(g=>matchGame(g,q));
  const cur=$('#lGame').value;
  if(!games.length){list.innerHTML='<div class="gsel-empty">검색 결과가 없어요</div>';return;}
  list.innerHTML=games.map(g=>`<div class="gsel-item ${g.id===cur?'on':''}" onclick="pickGame('${g.id}')"><span class="gsel-ico">${esc(g.icon)}</span><span class="gsel-nm">${esc(g.name)}</span>${g.id===cur?'<span class="gsel-chk">✓</span>':''}</div>`).join('');
}
window.filterGsel=v=>renderGselList(v.trim());
window.pickGame=id=>{$('#lGame').value=id;$('#gselCur').innerHTML=gselLabel(id)+'<span class="gsel-arrow">▾</span>';$('#gselPop').classList.remove('show');};
window.setMode=m=>{scoreMode=m;$('#mWin').classList.toggle('on',!m);$('#mScore').classList.toggle('on',m);refreshResult()};
window.togglePlayer=el=>{const id=el.dataset.id;if(selPlayers.includes(id)){selPlayers=selPlayers.filter(x=>x!==id);el.classList.remove('sel');selWinners=selWinners.filter(x=>x!==id);delete scores[id]}else{selPlayers.push(id);el.classList.add('sel')}refreshResult()};
window.addPlayerChip=async()=>{const name=$('#newP').value.trim();if(!name)return;const exists=DB.players.find(x=>x.name===name);const p=ensurePlayer(name);$('#newP').value='';const wrap=$('#lPlayers');const btn=document.createElement('button');btn.dataset.id=p.id;btn.textContent=p.name;btn.className='sel';btn.onclick=()=>togglePlayer(btn);wrap.appendChild(btn);selPlayers.push(p.id);refreshResult();if(!exists)await save();};

function rankMapFrom(scoreObj){const ranked=selPlayers.map(id=>({id,sc:scoreObj[id]!=null?+scoreObj[id]:null}));const s=ranked.filter(r=>r.sc!=null).sort((a,b)=>b.sc-a.sc);const rm={};s.forEach((r,i)=>{rm[r.id]=i>0&&s[i-1].sc===r.sc?rm[s[i-1].id]:i+1});return rm;}
function refreshResult(){
  const w=$('#resultArea');if(!w)return;
  if(!selPlayers.length){w.innerHTML='<div class="hint" style="margin:0">위에서 친구를 먼저 선택해주세요</div>';return}
  if(!scoreMode){
    w.innerHTML='<div class="hint" style="margin:0 0 10px">이긴 친구를 탭하세요 (여러 명 가능 · 협력게임은 다 같이 탭/아무도 안 탭)</div><div class="chip-pick">'+selPlayers.map(id=>{const p=DB.players.find(x=>x.id===id);return `<button data-id="${id}" class="${selWinners.includes(id)?'sel':''}" onclick="toggleWinner(this)">${selWinners.includes(id)?'👑 ':''}${esc(p.name)}</button>`}).join('')+'</div>';
  }else{
    const rm=rankMapFrom(scores);
    w.innerHTML='<div class="hint" style="margin:0 0 10px">점수 입력 시 등수 자동 (높은 점수=1등) · 음수 가능</div>'+selPlayers.map(id=>{const p=DB.players.find(x=>x.id===id);const rk=rm[id];return `<div class="pscore ${rk===1?'lead':''}"><span class="rk ${rk===1?'r1':''}">${rk?(rk===1?'1ST':rk+'TH'):'--'}</span><span class="pn">${esc(p.name)}</span><input type="number" inputmode="text" step="1" placeholder="점수" value="${scores[id]!=null?scores[id]:''}" oninput="setScore('${id}',this.value)"></div>`}).join('');
  }
}
window.toggleWinner=el=>{const id=el.dataset.id;if(selWinners.includes(id))selWinners=selWinners.filter(x=>x!==id);else selWinners.push(id);refreshResult()};
window.setScore=(id,v)=>{if(v==='')delete scores[id];else scores[id]=+v;
  const rm=rankMapFrom(scores);
  document.querySelectorAll('#resultArea .pscore').forEach(row=>{const inp=row.querySelector('input');const pid=inp.getAttribute('oninput').match(/'([^']+)'/)[1];const rk=rm[pid];const rkEl=row.querySelector('.rk');rkEl.textContent=rk?(rk===1?'1ST':rk+'TH'):'--';rkEl.className='rk'+(rk===1?' r1':'');row.classList.toggle('lead',rk===1);});
};
window.addLog=async()=>{
  const gameId=$('#lGame').value;
  if(!selPlayers.length){toast('참여한 친구를 선택해주세요');return}
  let winners=[],scoreData=null;
  if(scoreMode){
    const scored=selPlayers.filter(id=>scores[id]!=null);
    if(!scored.length){toast('점수를 입력하거나 승자 모드로 바꿔주세요');return}
    const maxSc=Math.max(...scored.map(id=>+scores[id]));
    winners=scored.filter(id=>+scores[id]===maxSc);
    scoreData={};selPlayers.forEach(id=>{if(scores[id]!=null)scoreData[id]=+scores[id]});
  }else{
    if(!selWinners.length){
      if(!confirm('승자를 선택하지 않았어요.\n전원 패배(협력 게임 실패 등)로 기록할까요?'))return;
    }
    winners=[...selWinners];
  }
  const dv=$('#lDate').value;let ts=Date.now();if(dv){const d=new Date(dv+'T12:00:00');if(!isNaN(d))ts=d.getTime()}
  if(editingLogId){
    const l=DB.logs.find(x=>x.id===editingLogId);
    if(l){l.gameId=gameId;l.players=[...selPlayers];l.winners=winners;l.date=ts;if(scoreData)l.scores=scoreData;else delete l.scores;}
    await save();closeSheet();render();document.querySelector('nav button[data-v="rank"]').click();toast('기록을 수정했어요 ✏️');
  }else{
    const entry={id:uid(),gameId,players:[...selPlayers],winners,date:ts};
    if(scoreData)entry.scores=scoreData;
    DB.logs.push(entry);
    await save();closeSheet();render();document.querySelector('nav button[data-v="rank"]').click();toast('기록 완료! 🏆');
  }
};

// 기본 멤버 보장 + 색상 없는 플레이어에게 순서대로 배정.
// 배열 순서 기준이라 어느 기기에서 계산해도 같은 색이 나오고,
// 다음 실제 저장 때 함께 서버에 기록되어 확정된다.
function normalizeDB(){
  FRIENDS.forEach(n=>ensurePlayer(n));
  DB.players.forEach(p=>{if(!p.color)p.color=pickColor()});
}

(async()=>{
  initKey();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
  await load();
  // 메모리에서만 보정 — 앱을 열기만 할 때는 절대 저장하지 않음
  normalizeDB();
  render();
})();
</script>
</body>
</html>
